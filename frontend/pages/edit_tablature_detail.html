<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редактирование Табулатуры</title>
  <link rel="stylesheet" href="/assets/styles/base.css" />
  <link rel="stylesheet" href="/assets/styles/components.css" />
  <link rel="stylesheet" href="/assets/styles/pages/edit_tablature_detail.css" />
</head>
<body>
  <main class="detail-page">
    <header class="detail-page__header">
      <a class="detail-page__back" id="backLink" href="/edit">← К списку табулатур</a>
      <h1 class="detail-page__title" id="pageTitle">Просмотр табулатуры</h1>
      <p class="detail-page__subtitle" id="subtitle">Загрузка...</p>
    </header>

    <section class="panel">
      <h2 class="panel__title">Основные параметры</h2>
      <label class="field-label" for="nameInput">Название</label>
      <input class="field-input" id="nameInput" type="text" placeholder="Название табулатуры" />
      <label class="field-label" for="visibilitySelect">Видимость</label>
      <select class="field-input" id="visibilitySelect">
        <option value="private">private</option>
        <option value="public">public</option>
      </select>
    </section>

    <section class="panel">
      <h2 class="panel__title">Табулатура</h2>
      <p class="panel__hint">Клик по символу включает/выключает удар: <code>x/o</code> ↔ <code>-</code>.</p>
      <div class="tab-editor" id="tabEditor">Загрузка...</div>
      <div class="panel__actions">
        <button class="btn btn--primary" id="saveBtn" type="button">Сохранить изменения</button>
      </div>
    </section>

    <section class="panel">
      <h2 class="panel__title">Статус</h2>
      <pre class="status" id="status">Готово к работе.</pre>
    </section>
  </main>

  <script type="module" src="/assets/scripts/pages/edit_tablature_detail.js?v=4"></script>
</body>
</html>
