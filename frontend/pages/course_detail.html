<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Курс</title>
  <link rel="stylesheet" href="/assets/styles/base.css" />
  <link rel="stylesheet" href="/assets/styles/components.css?v=6" />
  <link rel="stylesheet" href="/assets/styles/pages/course_detail.css?v=5" />
</head>
<body>
  <main class="course-detail-shell">
    <aside class="menu">
      <p class="menu__kicker">Барабанная платформа</p>
      <h1 class="menu__title">Навигация</h1>
      <a class="menu__btn" href="/#community">Библиотека сообщества</a>
      <a class="menu__btn" href="/#personal">Личная библиотека</a>
      <a class="menu__btn" href="/create">Создание табулатуры</a>
      <a class="menu__btn" href="/edit">Редактирование табулатуры</a>
      <a class="menu__btn menu__btn--active" href="/courses">Курсы</a>
    </aside>

    <section class="course-detail-page">
      <header class="course-detail-page__header">
        <div class="course-detail-page__intro">
          <a class="course-detail-page__back" id="courseBackLink" href="/courses">← обратно</a>
          <h1 class="course-detail-page__title" id="courseTitle">Курс</h1>
          <p class="course-detail-page__subtitle" id="courseSubtitle">Загрузка...</p>
        </div>

        <div class="top-auth" id="topAuth">
          <button class="btn btn--secondary top-auth__trigger" id="authEntryBtn" type="button">Вход</button>
          <section class="top-auth__panel" id="authPanel">
            <article class="top-auth__card">
              <h3 class="top-auth__title">Вход</h3>
              <label class="field-label" for="loginEmail">Электронная почта</label>
              <input class="field-input" id="loginEmail" type="email" placeholder="ваш_адрес@почта.рф" />
              <label class="field-label" for="loginPassword">Пароль</label>
              <input class="field-input" id="loginPassword" type="password" placeholder="Твой пароль" />
              <button class="btn btn--secondary" id="loginBtn" type="button">Войти</button>
            </article>

            <article class="top-auth__card">
              <h3 class="top-auth__title">Регистрация</h3>
              <label class="field-label" for="registerEmail">Электронная почта</label>
              <input class="field-input" id="registerEmail" type="email" placeholder="ваш_адрес@почта.рф" />
              <label class="field-label" for="registerNickname">Никнейм</label>
              <input class="field-input" id="registerNickname" type="text" placeholder="ник_барабанщика" />
              <label class="field-label" for="registerPassword">Пароль</label>
              <input class="field-input" id="registerPassword" type="password" placeholder="Минимум 6 символов" />
              <button class="btn btn--primary" id="registerBtn" type="button">Зарегистрироваться</button>
            </article>

            <p class="top-auth__status" id="authPanelStatus"></p>
          </section>
        </div>
      </header>

      <section class="panel is-hidden" id="lessonEditorPanel">
        <h2 class="panel__title">Добавить урок</h2>
        <label class="field-label" for="newLessonTitle">Название урока</label>
        <input class="field-input" id="newLessonTitle" type="text" placeholder="Например: Урок 1. Базовый грув" />
        <label class="field-label" for="newLessonContent">Содержание урока</label>
        <textarea class="field-input field-textarea" id="newLessonContent" placeholder="Описание урока"></textarea>
        <label class="field-label" for="newLessonPosition">Позиция в списке</label>
        <input class="field-input" id="newLessonPosition" type="number" min="1" step="1" placeholder="Авто (в конец)" />
        <div class="panel__actions">
          <button class="btn btn--primary" id="addLessonBtn" type="button">Добавить урок</button>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel__title">Список уроков</h2>
        <div class="lessons" id="lessonsList">
          <article class="lesson">
            <h3 class="lesson__title">Загрузка...</h3>
          </article>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel__title">Статус</h2>
        <pre class="status" id="status">Готово к работе.</pre>
      </section>
    </section>
  </main>

  <script type="module" src="/assets/scripts/pages/course_detail.js?v=10"></script>
</body>
</html>
